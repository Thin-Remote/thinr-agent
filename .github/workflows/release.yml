name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Matches tags like v1.0.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'  # Extra safety check

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if tag is on main branch
      run: |
        # Get the commit SHA of the tag
        TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
        
        # Check if this commit exists on main branch
        if git merge-base --is-ancestor $TAG_COMMIT origin/main; then
          echo "Tag is on main branch, proceeding with release"
        else
          echo "::error::Tag is not on main branch, skipping release"
          exit 1
        fi

    - name: Get tag name
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Determine if pre-release
      run: |
        if [[ "${{ env.TAG_NAME }}" == *"-alpha"* ]] || [[ "${{ env.TAG_NAME }}" == *"-beta"* ]] || [[ "${{ env.TAG_NAME }}" == *"-rc"* ]]; then
          echo "PRERELEASE=true" >> $GITHUB_ENV
        else
          echo "PRERELEASE=false" >> $GITHUB_ENV
        fi

    - name: Get changelog for this version
      run: |
        # Extract changelog section for this version if it exists
        version_without_v="${TAG_NAME#v}"
        awk "/^## \[${version_without_v}\]/,/^## \[/" CHANGELOG.md | sed '$d' > release_body.md || echo "No changelog found for version ${version_without_v}" > release_body.md

    - name: Create GitHub release
      uses: ncipollo/release-action@v1
      with:
        prerelease: ${{ env.PRERELEASE }}
        tag: ${{ env.TAG_NAME }}
        name: ${{ env.TAG_NAME }}
        token: ${{ secrets.GITHUB_TOKEN }}
        bodyFile: "release_body.md"
        allowUpdates: true

