name: Build

on:
  workflow_dispatch: # manual trigger
  push:
    branches: [ master, develop ] # build on push
  release:
    types: [ published ] # when a release is created, build and publish bins
  pull_request:
    branches: [ master,develop ] # when a pull request is opened only build

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  MODULE: thinr-agent
  BUILD_TYPE: Release

jobs:

  build_version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get tag version
      id : version
      run: |
        if [ ${{ github.event_name }} == 'release' ]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        elif [ ${{ github.event_name }} == 'pull_request' ]; then
          echo "version=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        fi

  build:
    runs-on: ubuntu-latest
    needs: build_version
    strategy:
      fail-fast: false # continues with matrix even if an element fails
      matrix:
        target: [
          "x86_64-linux-musl",
          "i686-linux-musl",
          "armv5l-linux-musleabi",
          "armv7-linux-musleabihf",
          "aarch64-linux-musl",
          "mips-linux-musl",
          "mipsel-linux-musl"
        ]
    container:
      image: ghcr.io/thin-remote/musl-toolchain:${{ matrix.target }}-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.build_version.outputs.version }}

    - name: Configure CMake
      run: |
        source /etc/bash.bashrc
        cmake -B /build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBUILD_VERSION=${{ needs.build_version.outputs.version }} -DBIN_EXTENSION=ON -DARCH=${{ matrix.target }}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build /build --config ${{ env.BUILD_TYPE }} --target thinr-agent -- -j$(nproc)

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: ${{ github.event_name == 'release' }}
      with:
        name: ${{ env.MODULE }}-${{ matrix.target }}
        path: /build/${{ env.MODULE }}.${{ matrix.target }}
        if-no-files-found: error
        retention-days: 1

  # TODO: Install and run

  upload_to_release: # when tag is created
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: [build_version, build]
    strategy:
      fail-fast: false # continues with matrix even if an element fails
      matrix:
        target: [
          "x86_64-linux-musl",
          "i686-linux-musl",
          "armv5l-linux-musleabi",
          "armv7-linux-musleabihf",
          "aarch64-linux-musl",
          "mips-linux-musl",
          "mipsel-linux-musl"
        ]

    steps:

    - name: Download ${{ matrix.target }} binary
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.MODULE }}-${{ matrix.target }}

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ env.MODULE }}.${{ matrix.target }}
        tag: ${{ needs.build_version.outputs.version }}

