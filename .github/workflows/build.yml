name: Build

on:
  workflow_dispatch: # manual trigger
  push:
    branches: [ main, develop ] # build on push
  release:
    types: [ published ] # when a release is created, build and publish bins
  pull_request:
    branches: [ main, develop ] # when a pull request is opened only build

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  MODULE: thinr-agent
  BUILD_TYPE: Release

jobs:

  build_version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get tag version
      id : version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "version=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        fi

  build_linux:
    runs-on: [self-hosted, linux]
    needs: build_version
    strategy:
      fail-fast: false # continues with matrix even if an element fails
      matrix:
        target: [
          "x86_64-linux-musl",
          "i386-linux-musl",
          "i686-linux-musl",
          "armv5l-linux-musleabi",
          "armv6-linux-musleabihf",
          "armv7-linux-musleabihf",
          "aarch64-linux-musl",
          "mips-linux-musl",
          "mipsel-linux-musl",
          "mipsel-linux-muslsf",
          "mips64-linux-musl",
          "mips64el-linux-musl",
          "powerpc-linux-musl",
          "powerpc64le-linux-musl",
          "riscv32-linux-musl",
          "riscv64-linux-musl"
        ]
    container:
      image: ghcr.io/thin-remote/musl-toolchain:${{ matrix.target }}-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.build_version.outputs.version }}

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B /build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBUILD_VERSION=${{ needs.build_version.outputs.version }} -DBIN_EXTENSION=ON -DARCH=${{ matrix.target }} -DSTATIC=ON

    - name: Build
      # Build your program with the given configuration
      run: cmake --build /build --config ${{ env.BUILD_TYPE }} --target thinr-agent -- -j$(nproc)

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MODULE }}-${{ matrix.target }}
        path: /build/${{ env.MODULE }}.${{ matrix.target }}
        if-no-files-found: error
        retention-days: 1

  # TODO: Install and run

  build_macos:
    runs-on: [self-hosted, macOS, ARM64]
    needs: build_version
    strategy:
      matrix:
        arch: [arm64]  # Only build for native architecture
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.build_version.outputs.version }}
    
    - name: Configure CMake
      run: |
        cmake -B build-${{ matrix.arch }} \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_VERSION=${{ needs.build_version.outputs.version }} \
          -DSTATIC=ON \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
    
    - name: Build
      run: cmake --build build-${{ matrix.arch }} --config ${{ env.BUILD_TYPE }} --target thinr-agent -- -j$(sysctl -n hw.ncpu)
    
    - name: Rename binary with architecture
      run: |
        mv build-${{ matrix.arch }}/thinr-agent build-${{ matrix.arch }}/thinr-agent.${{ matrix.arch }}-darwin
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MODULE }}-${{ matrix.arch }}-darwin
        path: build-${{ matrix.arch }}/${{ env.MODULE }}.${{ matrix.arch }}-darwin
        if-no-files-found: error
        retention-days: 1

  upload_to_release: # when tag is created
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: [build_version, build_linux, build_macos]
    strategy:
      fail-fast: false # continues with matrix even if an element fails
      matrix:
        target: [
          "x86_64-linux-musl",
          "i386-linux-musl",
          "i686-linux-musl",
          "armv5l-linux-musleabi",
          "armv6-linux-musleabihf",
          "armv7-linux-musleabihf",
          "aarch64-linux-musl",
          "mips-linux-musl",
          "mipsel-linux-musl",
          "mipsel-linux-muslsf",
          "mips64-linux-musl",
          "mips64el-linux-musl",
          "powerpc-linux-musl",
          "powerpc64le-linux-musl",
          "riscv32-linux-musl",
          "riscv64-linux-musl",
          "arm64-darwin"
        ]

    steps:

    - name: Download ${{ matrix.target }} binary
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.MODULE }}-${{ matrix.target }}

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ env.MODULE }}.${{ matrix.target }}
        tag: ${{ needs.build_version.outputs.version }}

  # Upload to S3 for CDN distribution
  upload_to_s3:
    runs-on: ubuntu-latest
    needs: [build_linux, build_macos]
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Determine channel
      id: channel
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          # For releases, use the tag name
          echo "channel=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "install_script=install.sh" >> $GITHUB_OUTPUT
        elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          echo "channel=main" >> $GITHUB_OUTPUT
          echo "install_script=install-main.sh" >> $GITHUB_OUTPUT
        elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
          echo "channel=develop" >> $GITHUB_OUTPUT
          echo "install_script=install-develop.sh" >> $GITHUB_OUTPUT
        fi

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload binaries to S3
      run: |
        # Create binaries directory structure
        mkdir -p binaries/${{ steps.channel.outputs.channel }}
        
        # Move all binaries to the correct location
        for artifact_dir in artifacts/*; do
          if [ -d "$artifact_dir" ]; then
            cp $artifact_dir/* binaries/${{ steps.channel.outputs.channel }}/
          fi
        done
        
        # If this is a release, also copy to latest
        if [[ "${{ github.event_name }}" == "release" ]]; then
          mkdir -p binaries/latest
          cp binaries/${{ steps.channel.outputs.channel }}/* binaries/latest/
        fi
        
        # Upload to S3 (don't use --delete to preserve other versions)
        aws s3 sync binaries/ s3://${{ secrets.S3_BUCKET }}/binaries/ --cache-control "max-age=3600"

    - name: Generate and upload install script
      run: |
        # Read the base install script
        INSTALL_TEMPLATE="${{ github.workspace }}/scripts/install.sh"
        
        # Generate channel-specific install script
        # For releases, install.sh points to 'latest', others point to their specific channel
        if [[ "${{ github.event_name }}" == "release" ]]; then
          # For release, install.sh uses 'latest' channel
          cp "$INSTALL_TEMPLATE" ${{ steps.channel.outputs.install_script }}
        else
          # For branches, replace default with specific channel
          sed 's/CHANNEL="${CHANNEL:-latest}"/CHANNEL="${CHANNEL:-${{ steps.channel.outputs.channel }}}"/' "$INSTALL_TEMPLATE" > ${{ steps.channel.outputs.install_script }}
        fi
        
        # Make it executable
        chmod +x ${{ steps.channel.outputs.install_script }}
        
        # Upload install script to S3
        aws s3 cp ${{ steps.channel.outputs.install_script }} s3://${{ secrets.S3_BUCKET }}/ --cache-control "max-age=300"
        
        # Generate version metadata JSON with checksums
        CHANNEL="${{ steps.channel.outputs.channel }}"
        VERSION="$CHANNEL"

        # Generate checksums for all binaries in this channel
        CHECKSUMS="{"
        FIRST=true
        for binary in binaries/$CHANNEL/thinr-agent.*; do
          [ -f "$binary" ] || continue
          SUFFIX="$(basename "$binary" | sed 's/^thinr-agent\.//')"
          SHA256="$(sha256sum "$binary" | awk '{print $1}')"
          if [ "$FIRST" = true ]; then
            FIRST=false
          else
            CHECKSUMS="$CHECKSUMS,"
          fi
          CHECKSUMS="$CHECKSUMS\"$SUFFIX\":\"sha256:$SHA256\""
        done
        CHECKSUMS="$CHECKSUMS}"

        # Upload channel.json (e.g., latest.json, main.json, develop.json)
        cat > ${CHANNEL}.json << EOJSON
        {
          "version": "$VERSION",
          "checksums": $CHECKSUMS
        }
        EOJSON

        aws s3 cp ${CHANNEL}.json s3://${{ secrets.S3_BUCKET }}/ \
          --cache-control "max-age=60" \
          --content-type "application/json"

        # For releases, also upload as latest.json
        if [[ "${{ github.event_name }}" == "release" ]]; then
          cp ${CHANNEL}.json latest.json
          aws s3 cp latest.json s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "max-age=60" \
            --content-type "application/json"
        fi

    - name: Invalidate CloudFront cache
      if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      env:
        CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/${{ steps.channel.outputs.install_script }}" "/binaries/${{ steps.channel.outputs.channel }}/*" "/${{ steps.channel.outputs.channel }}.json" "/latest.json"

